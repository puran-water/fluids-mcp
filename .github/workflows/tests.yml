name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov

    - name: Install package
      run: |
        pip install -e .

    - name: Smoke test - entrypoint import
      run: |
        python -c "from server import main; print('Entrypoint OK')"
        python -c "from omnitools.pipe_flow import pipe_flow; print('Omnitools OK')"

    - name: Smoke test - wheel build and install
      run: |
        pip install build
        python -m build --wheel
        pip install dist/*.whl --force-reinstall --no-deps
        python -c "from server import main; print('Wheel entrypoint OK')"
        python -c "import shutil; assert shutil.which('fluids-mcp'), 'Console script not found in PATH'; print('Console script installed OK')"
        pip install -e .

    - name: Run tests with coverage
      run: |
        python -m pytest tests/ -v --cov=tools --cov=utils --cov=pydraulics --cov=omnitools --cov-report=term-missing --ignore-glob="*__pycache__*"
